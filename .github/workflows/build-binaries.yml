name: Build Binaries

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to upload binaries to (e.g. v0.1.3)'
        required: true
        type: string
      snapshot:
        description: 'Snapshot the AOT module is traced against'
        required: false
        default: 'alpine-3.23.0-256mb'
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload binaries to (e.g. v0.1.3)'
        required: true
        type: string
      snapshot:
        description: 'Snapshot the AOT module is traced against'
        required: false
        default: 'alpine-3.23.0-256mb'
        type: string

permissions:
  contents: write

jobs:
  build-aot:
    uses: ./.github/workflows/build-aot.yml
    with:
      snapshot: ${{ inputs.snapshot }}

  build:
    name: ${{ matrix.target }}
    needs: build-aot
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Inject version
        shell: bash
        run: |
          V="${{ inputs.tag }}"
          V="${V#v}"
          perl -i -pe "s/^version = .*/version = \"$V\"/" crates/vpod/Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild (Linux aarch64)
        if: matrix.zigbuild
        run: |
          pip install ziglang
          cargo install cargo-zigbuild
          rustup target add aarch64-unknown-linux-gnu

      - name: Fetch AOT engine module
        uses: actions/download-artifact@v4
        with:
          name: aot-wasm
          path: dist/aot

      - name: Place module for build.rs
        shell: bash
        run: cp dist/aot/vpod-wasi-cli.wasm crates/vpod/vpod-wasi-cli.wasm

      - name: Build binary (native)
        if: "!matrix.zigbuild"
        run: cargo build --release --target ${{ matrix.target }} -p vpod

      - name: Build binary (zigbuild)
        if: matrix.zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }} -p vpod

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/vpod
          ARCHIVE=vpod-${{ matrix.target }}.tar.gz
          tar czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/vpod.exe"
          $archive = "vpod-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ env.ASSET }}
          draft: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
